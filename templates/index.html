<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radar de Vagas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #1e293b;
            margin: 5px;
            border-radius: 5px;
        }

        .active {
            background: #38bdf8;
            color: black;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .vaga {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .apply {
            background: #22c55e;
            color: white;
        }

        .done {
            background: gray;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<header>
    🚀 Radar de Vagas
</header>

<div class="tabs">
    <div class="tab active" onclick="mostrarAba('todas')">Vagas Total</div>
    <div class="tab" onclick="mostrarAba('candidatas')">Já aplicadas</div>
</div>

<div class="container">

    <!-- 🔹 TODAS -->
    <div id="todas">
        {% for vaga in vagas %}
            {% if not vaga.candidatado %}
            <div class="vaga">
                <a href="{{ vaga.link }}" target="_blank">
                    {{ vaga.titulo }}
                </a>

                <br>

                <a href="/candidatar/{{ vaga.link }}">
                    <button class="btn apply">Já apliquei</button>
                </a>
            </div>
            {% endif %}
        {% endfor %}
    </div>

    <!-- 🔹 CANDIDATAS -->
    <div id="candidatas" class="hidden">
        {% for vaga in vagas %}
            {% if vaga.candidatado %}
            <div class="vaga">
                <a href="{{ vaga.link }}" target="_blank">
                    {{ vaga.titulo }}
                </a>

                <br>

                <button class="btn done">✅ Já aplicado</button>
            </div>
            {% endfor %}
        {% else %}
            <p>Nenhuma candidatura ainda.</p>
        {% endif %}
    </div>

</div>

<script>
function mostrarAba(aba) {
    document.getElementById("todas").classList.add("hidden");
    document.getElementById("candidatas").classList.add("hidden");

    document.getElementById(aba).classList.remove("hidden");

    let tabs = document.querySelectorAll(".tab");
    tabs.forEach(t => t.classList.remove("active"));

    if (aba === "todas") {
        tabs[0].classList.add("active");
    } else {
        tabs[1].classList.add("active");
    }
}
</script>

</body>
</html>
