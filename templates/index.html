<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radar de Vagas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .vaga {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .score {
            color: #facc15;
        }
    </style>
</head>
<body>

    <h1>🚀 Vagas (últimas 24h)</h1>

    {% if vagas %}
        {% for vaga in vagas %}
            <div class="vaga">
                <a href="{{ vaga.link }}" target="_blank">
                    {{ vaga.titulo }}
                </a>
                <p class="score">Score: {{ vaga.score }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>Nenhuma vaga encontrada.</p>
    {% endif %}

</body>
</html>
