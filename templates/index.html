<!DOCTYPE html>
<html>
<head>
    <title>Vagas Daniel</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; margin: 0; }
        header { background: #111; color: white; padding: 15px; text-align: center; }

        .container { display: flex; gap: 20px; padding: 20px; }

        .col { flex: 1; background: white; padding: 15px; border-radius: 10px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }

        button {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .vaga {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .aplicar {
            background: green;
            color: white;
            margin-top: 5px;
        }

        .filtro {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h2>Vagas Daniel</h2>
</header>

<div class="container">

    <!-- VAGAS -->
    <div class="col">
        <div class="tabs">
            <button onclick="carregar('12h')" class="filtro">Últimas 12h</button>
            <button onclick="carregar('24h')" class="filtro">Últimas 24h</button>
        </div>

        <div id="vagas"></div>
    </div>

    <!-- APLICADAS -->
    <div class="col">
        <h3>Vagas Aplicadas</h3>
        <div id="aplicadas"></div>
    </div>

</div>

<script>

async function carregar(filtro) {
    const res = await fetch(`/api/vagas?filtro=${filtro}`);
    const data = await res.json();

    const div = document.getElementById("vagas");
    div.innerHTML = "";

    data.forEach(v => {
        div.innerHTML += `
            <div class="vaga">
                <b>${v.titulo}</b><br>
                ${v.empresa}<br>
                <small>${v.timestamp}</small><br>
                <button class="aplicar" onclick="aplicar('${v.id}')">
                    Já apliquei
                </button>
            </div>
        `;
    });
}

async function aplicar(id) {
    await fetch("/api/marcar_aplicada", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id})
    });

    carregar("24h");
    carregarAplicadas();
}

async function carregarAplicadas() {
    const res = await fetch("/api/aplicadas");
    const data = await res.json();

    const div = document.getElementById("aplicadas");
    div.innerHTML = "";

    data.forEach(v => {
        div.innerHTML += `
            <div class="vaga">
                <b>${v.titulo}</b><br>
                ${v.empresa}<br>
                <small>${v.timestamp}</small>
            </div>
        `;
    });
}

carregar("24h");
carregarAplicadas();

</script>

</body>
</html>
